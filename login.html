<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - EcoEats</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--bg-color); }
        .login-wrap { width:90%; max-width:440px; }

        /* Account picker card */
        .card { background:var(--card-bg); border-radius:20px; box-shadow:0 8px 32px rgba(0,0,0,0.12); padding:2.5rem 2.5rem 2rem; }
        .brand { display:flex; flex-direction:column; align-items:center; margin-bottom:1.8rem; }
        .brand .logo-icon { width:56px; height:56px; font-size:1.6rem; margin-bottom:0.6rem; }
        .brand h2 { font-size:1.5rem; font-weight:700; color:var(--primary-green); margin:0; }
        .brand p { color:var(--text-secondary); font-size:0.9rem; margin:0.2rem 0 0; }

        /* Saved account chips (Google-style) */
        .accounts-label { font-size:0.8rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.6rem; }
        .account-chip { display:flex; align-items:center; gap:0.9rem; padding:0.75rem 1rem; border-radius:12px; border:1.5px solid var(--border-color); cursor:pointer; transition:all 0.2s; margin-bottom:0.5rem; background:var(--card-bg); }
        .account-chip:hover { border-color:var(--primary-green); background:#F0F9F0; }
        .account-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem; color:#fff; flex-shrink:0; }
        .account-info { flex:1; }
        .account-info strong { display:block; font-size:0.95rem; }
        .account-info span { font-size:0.8rem; color:var(--text-secondary); }
        .account-check { color:var(--primary-green); font-size:1.1rem; }

        .divider { display:flex; align-items:center; gap:0.8rem; margin:1.2rem 0; color:var(--text-secondary); font-size:0.85rem; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border-color); }

        /* Form fields */
        .field { margin-bottom:1rem; }
        .field label { display:block; font-weight:600; font-size:0.88rem; margin-bottom:0.35rem; color:var(--text-primary); }
        .field input { width:100%; padding:0.75rem 1rem; border:1.5px solid var(--border-color); border-radius:10px; font-size:0.95rem; outline:none; background:var(--card-bg); color:var(--text-primary); box-sizing:border-box; transition:border-color 0.2s; }
        .field input:focus { border-color:var(--primary-green); }

        .btn-signin { width:100%; padding:0.85rem; background:var(--primary-green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
        .btn-signin:hover { background:var(--primary-green-hover); }

        .msg-box { padding:0.7rem 1rem; border-radius:8px; font-size:0.9rem; margin-bottom:1rem; display:none; }
        .msg-box.error { background:#FFF0F0; color:#D32F2F; }
        .msg-box.success { background:#E8F5E9; color:#2E7D32; }

        .switch-row { text-align:center; margin-top:1.2rem; font-size:0.88rem; color:var(--text-secondary); }
        .switch-row a { color:var(--primary-green); font-weight:600; cursor:pointer; }

        /* Panels */
        .panel { display:none; }
        .panel.active { display:block; }
        #picker-panel.active { display:block; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="card">
        <div class="brand">
            <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
            <h2>EcoEats</h2>
            <p>Save food · Save money · Save the planet</p>
        </div>

        <div id="msg-box" class="msg-box"></div>

        <!-- PANEL 1: Account picker (Google-style) -->
        <div id="picker-panel" class="panel active">
            <p class="accounts-label">Choose an account</p>
            <!-- Saved accounts will inject here -->
            <div id="saved-accounts"></div>

            <div class="divider">or</div>

            <button class="account-chip" onclick="showPanel('login-panel')" style="justify-content:center; color:var(--primary-green); font-weight:600; border-style:dashed;">
                <i class="fa-solid fa-plus"></i> Use another account
            </button>
            <button class="account-chip" onclick="showPanel('signup-panel')" style="justify-content:center; margin-top:0.3rem;">
                <i class="fa-solid fa-user-plus" style="color:var(--accent-orange);"></i> Create an account
            </button>
        </div>

        <!-- PANEL 2: Email / Password login -->
        <div id="login-panel" class="panel">
            <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:1.2rem;">Sign in to EcoEats</p>
            <form onsubmit="handleLogin(event)">
                <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" required></div>
                <div class="field">
                    <div style="display:flex; justify-content:space-between;">
                        <label>Password</label>
                        <a onclick="showPanel('reset-panel')" style="font-size:0.8rem; color:var(--primary-green); cursor:pointer;">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn-signin"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
            </form>
            <p class="switch-row"><a onclick="showPanel('picker-panel')">← Back</a> &nbsp;·&nbsp; No account? <a onclick="showPanel('signup-panel')">Sign Up</a></p>
        </div>

        <!-- PANEL 3: Signup -->
        <div id="signup-panel" class="panel">
            <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:1.2rem;">Create your EcoEats account</p>
            <form onsubmit="handleSignup(event)">
                <div class="field"><label>Full Name</label><input type="text" id="signup-name" placeholder="Your full name" required></div>
                <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" required></div>
                <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6"></div>
                <button type="submit" class="btn-signin"><i class="fa-solid fa-user-plus"></i> Create Account</button>
            </form>
            <p class="switch-row"><a onclick="showPanel('picker-panel')">← Back</a> &nbsp;·&nbsp; Have an account? <a onclick="showPanel('login-panel')">Sign In</a></p>
        </div>

        <!-- PANEL 4: Reset Password -->
        <div id="reset-panel" class="panel">
            <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:1.2rem;">Reset your password</p>
            <form onsubmit="handleReset(event)">
                <div class="field"><label>Email</label><input type="email" id="reset-email" placeholder="you@example.com" required></div>
                <div class="field"><label>New Password</label><input type="password" id="reset-password" placeholder="Min. 6 characters" required minlength="6"></div>
                <button type="submit" class="btn-signin"><i class="fa-solid fa-key"></i> Reset Password</button>
            </form>
            <p class="switch-row"><a onclick="showPanel('login-panel')">← Back to Login</a></p>
        </div>

        <!-- PANEL 5: Quick Login for saved account -->
        <div id="quick-login-panel" class="panel">
            <div style="text-align:center; margin-bottom:1.5rem;">
                <div id="quick-avatar" style="width:64px; height:64px; border-radius:50%; margin:0 auto 0.8rem; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.8rem; font-weight:700;"></div>
                <strong id="quick-name" style="font-size:1.1rem; display:block;"></strong>
                <span id="quick-email" style="font-size:0.9rem; color:var(--text-secondary);"></span>
            </div>
            
            <form onsubmit="handleQuickLogin(event)">
                <input type="hidden" id="quick-email-input">
                <div class="field">
                    <div style="display:flex; justify-content:space-between;">
                        <label>Password</label>
                        <a onclick="showPanel('reset-panel', document.getElementById('quick-email-input').value)" style="font-size:0.8rem; color:var(--primary-green); cursor:pointer;">Forgot?</a>
                    </div>
                    <input type="password" id="quick-password-input" placeholder="Your password" required autofocus>
                </div>
                <button type="submit" class="btn-signin"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
            </form>
            <p class="switch-row"><a onclick="showPanel('picker-panel')">← Back</a></p>
        </div>
    </div>
</div>

<script>
// Redirect if already logged in
if (localStorage.getItem('ecoeats_token')) window.location.href = 'index.html';

// Dark mode
if (localStorage.getItem('ecoeats_dark') === '1') document.body.classList.add('dark-mode');

// Avatar colours pool
const COLOURS = ['#00B74A','#FF5C00','#5C6BC0','#E53935','#00897B','#F4511E'];

function showPanel(id, extra = null) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('msg-box').style.display = 'none';
    
    if (id === 'reset-panel' && extra) {
        document.getElementById('reset-email').value = extra;
    }
}

function showMsg(msg, type = 'error') {
    const box = document.getElementById('msg-box');
    box.className = `msg-box ${type}`;
    box.innerText = msg;
    box.style.display = 'block';
}

// Build saved account chips from localStorage
function buildAccountPicker() {
    const container = document.getElementById('saved-accounts');
    const raw = localStorage.getItem('ecoeats_saved_accounts');
    const accounts = raw ? JSON.parse(raw) : [];

    if (accounts.length === 0) {
        container.innerHTML = '';
        return;
    }

    container.innerHTML = accounts.map((acc, i) => {
        const initials = acc.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const colour = COLOURS[i % COLOURS.length];
        return `
        <div class="account-chip" onclick="loginAsAccount('${acc.email}', '${acc.name}', '${colour}')">
            <div class="account-avatar" style="background:${colour};">${initials}</div>
            <div class="account-info">
                <strong>${acc.name}</strong>
                <span>${acc.email}</span>
            </div>
            <i class="fa-solid fa-chevron-right" style="color:var(--text-secondary); font-size:0.85rem;"></i>
        </div>`;
    }).join('');
}

async function loginAsAccount(email, name, colour) {
    document.getElementById('quick-email').innerText = email;
    document.getElementById('quick-name').innerText = name;
    document.getElementById('quick-email-input').value = email;
    
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const avatar = document.getElementById('quick-avatar');
    avatar.innerText = initials;
    avatar.style.background = colour;
    
    document.getElementById('quick-password-input').value = '';
    
    showPanel('quick-login-panel');
    setTimeout(() => document.getElementById('quick-password-input').focus(), 100);
}

async function handleQuickLogin(e) {
    e.preventDefault();
    const email = document.getElementById('quick-email-input').value;
    const pwd = document.getElementById('quick-password-input').value;
    await doLogin(email, pwd);
}

async function doLogin(email, password) {
    try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('ecoeats_token', data.token);
            localStorage.setItem('ecoeats_user', JSON.stringify(data.user));
            saveAccount(data.user.name, email);
            window.location.href = 'index.html';
        } else {
            showMsg(data.error);
        }
    } catch(e) { showMsg('Could not connect to server.'); }
}

function saveAccount(name, email) {
    const raw = localStorage.getItem('ecoeats_saved_accounts');
    const accounts = raw ? JSON.parse(raw) : [];
    if (!accounts.find(a => a.email === email)) {
        accounts.unshift({ name, email });
        localStorage.setItem('ecoeats_saved_accounts', JSON.stringify(accounts.slice(0, 4)));
    }
}

async function handleLogin(e) {
    e.preventDefault();
    await doLogin(document.getElementById('login-email').value, document.getElementById('login-password').value);
}

async function handleSignup(e) {
    e.preventDefault();
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    if (password.length < 6) return showMsg('Password must be at least 6 characters.');
    try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('ecoeats_token', data.token);
            localStorage.setItem('ecoeats_user', JSON.stringify(data.user));
            saveAccount(name, email);
            window.location.href = 'index.html';
        } else {
            showMsg(data.error);
        }
    } catch(e) { showMsg('Could not connect to server.'); }
}

async function handleReset(e) {
    e.preventDefault();
    const email = document.getElementById('reset-email').value;
    const new_password = document.getElementById('reset-password').value;
    if (new_password.length < 6) return showMsg('Password must be at least 6 characters.');
    
    try {
        const res = await fetch('http://localhost:5000/api/auth/reset-password', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, new_password })
        });
        const data = await res.json();
        if (res.ok) {
            showMsg(data.message, 'success');
            setTimeout(() => showPanel('login-panel'), 2000);
        } else {
            showMsg(data.error);
        }
    } catch(e) { showMsg('Could not connect to server.'); }
}


buildAccountPicker();
</script>
<script src="notifications.js"></script>
</body>
</html>
