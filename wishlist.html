<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - EcoEats</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wishlist-hero { background: linear-gradient(135deg, #00B74A 0%, #007A30 100%); padding: 3rem 2rem 2.5rem; color: #fff; }
        .wishlist-hero h1 { font-size: 2rem; font-weight: 700; margin: 0; }
        .wishlist-hero p { opacity: 0.85; margin: 0.4rem 0 0; }
        .wishlist-count { display: inline-block; background: rgba(255,255,255,0.2); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 0.6rem; }

        .wishlist-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h2 { font-size: 1.4rem; color: var(--text-primary); margin-bottom: 0.5rem; }

        /* Reuse food-grid & food-card from style.css */
        .fav-heart-overlay { position:absolute; top:12px; right:12px; background:rgba(255,255,255,0.9); border:none; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:2; color:#E53935; }
        .fav-heart-overlay:hover { transform:scale(1.15); background: var(--card-bg); }
        .kitchen-chip { display:inline-flex; align-items:center; gap:0.35rem; background:var(--bg-color); border:1px solid var(--border-color); padding:0.25rem 0.6rem; border-radius:20px; font-size:0.78rem; color:var(--text-secondary); margin-bottom:0.5rem; text-decoration:none; }
        .kitchen-chip:hover { border-color:var(--primary-green); color:var(--primary-green); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
            <a href="index.html" style="text-decoration:none; color:inherit;"><span class="logo-text">EcoEats</span></a>
        </div>
        <div class="nav-actions">
            <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
            <a href="index.html" class="btn btn-outline" style="text-decoration:none;"><i class="fa-solid fa-house"></i> Home</a>
            <a href="cart.html" class="cart-icon" style="color:inherit; text-decoration:none;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
        </div>
    </header>
    <div class="toast-container" id="toast-container"></div>

    <!-- Hero -->
    <div class="wishlist-hero">
        <div style="max-width:1200px; margin:0 auto; padding:0 1.5rem;">
            <h1><i class="fa-solid fa-heart"></i> My Wishlist</h1>
            <p>Your saved surplus food deals</p>
            <span class="wishlist-count" id="wishlist-count">Loading…</span>
        </div>
    </div>

    <!-- Grid -->
    <div class="wishlist-wrap">
        <div class="food-grid" id="wishlist-grid">
            <div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-secondary);">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem; margin-bottom:1rem;"></i>
                <p>Loading your wishlist…</p>
            </div>
        </div>
    </div>

    <script>
        // Dark mode
        function initDarkMode() {
            if (localStorage.getItem('ecoeats_dark') === '1') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('dark-toggle');
                if (btn) btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('ecoeats_dark', isDark ? '1' : '0');
            const btn = document.getElementById('dark-toggle');
            if (btn) btn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }
        initDarkMode();

        // Cart count
        const cartRaw = localStorage.getItem('ecoeats_cart');
        const cartItems = cartRaw ? JSON.parse(cartRaw) : [];
        document.getElementById('cart-count').innerText = cartItems.reduce((s, i) => s + i.cartQty, 0);

        // Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            const icon = type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check';
            const color = type === 'error' ? 'var(--urgent-red)' : 'var(--primary-green)';
            toast.innerHTML = `<i class="fa-solid ${icon}" style="color:${color}; margin-right:0.5rem;"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Load wishlist
        async function loadWishlist() {
            const grid = document.getElementById('wishlist-grid');
            const token = localStorage.getItem('ecoeats_token');
            if (!token) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-icon">🔐</div>
                    <h2>Please log in</h2>
                    <p>You need to be logged in to view your wishlist.</p>
                    <a href="login.html" class="btn btn-primary" style="text-decoration:none; display:inline-block; margin-top:1rem;">Sign In</a>
                </div>`;
                document.getElementById('wishlist-count').innerText = '0 items';
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/api/favorites', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const items = await res.json();

                if (!items.length) {
                    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-icon">💔</div>
                        <h2>Your wishlist is empty</h2>
                        <p>Tap the ♡ heart on any food deal to save it here.</p>
                        <a href="index.html" class="btn btn-primary" style="text-decoration:none; display:inline-block; margin-top:1rem;">Browse Deals</a>
                    </div>`;
                    document.getElementById('wishlist-count').innerText = '0 items';
                    return;
                }

                document.getElementById('wishlist-count').innerText = `${items.length} item${items.length !== 1 ? 's' : ''} saved`;
                grid.innerHTML = items.map(item => buildWishCard(item)).join('');

            } catch(e) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--text-secondary);">Could not load wishlist. Is the server running?</div>`;
            }
        }

        function buildWishCard(item) {
            const isVeg = item.is_veg === 1;
            return `
            <div class="food-card" style="position:relative;" id="card-${item.item_id}">
                <div class="food-image" style="background-image: url('${item.image_url}');">
                    <button class="fav-heart-overlay" onclick="removeFav(${item.item_id})" title="Remove from wishlist">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                <div class="food-details">
                    <a href="kitchen.html?id=${item.kitchen_id}" class="kitchen-chip">
                        <i class="fa-solid fa-store" style="font-size:0.7rem;"></i> ${item.kitchen_name}
                    </a>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.2rem;">
                        <h3 class="dish-name" style="margin:0;">${item.food_name}</h3>
                        <span class="veg-badge ${isVeg ? 'veg' : 'non-veg'}"><span class="veg-dot"></span>${isVeg ? 'VEG' : 'NON-VEG'}</span>
                    </div>
                    <div class="price-row">
                        <span class="current-price">₹${item.original_price}</span>
                    </div>
                    <div class="stock-action-row">
                        <span></span>
                        <a href="kitchen.html?id=${item.kitchen_id}" class="btn btn-add" style="text-decoration:none;">
                            <i class="fa-solid fa-arrow-right"></i> View Kitchen
                        </a>
                    </div>
                </div>
            </div>`;
        }

        async function removeFav(itemId) {
            const token = localStorage.getItem('ecoeats_token');
            try {
                await fetch('http://localhost:5000/api/favorites/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ item_id: itemId })
                });
                const card = document.getElementById(`card-${itemId}`);
                if (card) {
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    setTimeout(() => { card.remove(); refreshCount(); }, 300);
                }
                showToast('Removed from wishlist');
            } catch(e) { showToast('Could not remove item', 'error'); }
        }

        function refreshCount() {
            const remaining = document.querySelectorAll('.food-card').length;
            document.getElementById('wishlist-count').innerText = `${remaining} item${remaining !== 1 ? 's' : ''} saved`;
            if (remaining === 0) {
                document.getElementById('wishlist-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-icon">💔</div>
                    <h2>Your wishlist is empty</h2>
                    <p>Tap the ♡ heart on any food deal to save it here.</p>
                    <a href="index.html" class="btn btn-primary" style="text-decoration:none; display:inline-block; margin-top:1rem;">Browse Deals</a>
                </div>`;
            }
        }

        loadWishlist();
    </script>
<script src="notifications.js"></script>
</body>
</html>
